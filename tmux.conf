# Prefix
unbind C-b
set -g prefix C-a

# Reload config
bind r source-file $HOME/.tmux.conf \; display "Configuration Reloaded!"

# Splits (open in current path)
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Window navigation
bind Tab last-window
unbind l
bind Right next-window
bind Left previous-window

# Pane navigation
bind - select-pane -l
unbind -

# Window/pane indexing
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename off
set -g renumber-windows on

# Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Misc timings
set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 10

# Mouse
setw -g mouse on

# Activity alerts
setw -g monitor-activity on
set -g visual-activity on

# Status bar
set -g status on
set -g status-bg colour0
set -g status-justify left
set -g status-left-length 100
set -g status-left ''
set -g status-right-length 100
set -g status-right '#[fg=colour7] %H:%M #h '
bind F set -g status

set -g window-status-current-format "#[fg=colour15,bold]#[bg=colour4] #{?window_zoomed_flag,[,}#I#[fg=colour15,bold] #W#{?window_zoomed_flag,],} #[fg=colour4]#[bg=colour0]"
set -g window-status-format "#[fg=colour244]#[bg=colour0]#{?window_zoomed_flag,[,}#I#[fg=colour240] #W#{?window_zoomed_flag,],}"

# Inactive pane dimming
set-window-option -g window-active-style bg=terminal
set-window-option -g window-style bg=colour238

# Vi mode
setw -g mode-keys vi

# Copy mode
bind-key i copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi J send-keys -X -N 3 scroll-down
bind-key -T copy-mode-vi K send-keys -X -N 3 scroll-up

# Pane resizing
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# Smart pane switching with vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
